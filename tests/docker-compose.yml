services:
  db:
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    image: postgres:14.1-alpine
    ports:
      - "6543:5432"
    restart: always
    volumes:
      - db:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    restart: always
volumes:
  db:
    driver: local
